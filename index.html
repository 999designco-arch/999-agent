<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>999 Agent P3</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;background:#050505;color:#fff;margin:0;padding:0}header{padding:20px;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center;background:#0b0b12}.logo{font-weight:900;font-size:22px}.wrap{max-width:1200px;margin:auto;padding:30px}.card{background:#111827;border:1px solid #222;padding:20px;border-radius:20px;margin-bottom:20px}.input,textarea,select{width:100%;padding:14px;background:#050505;border:1px solid #333;border-radius:12px;color:#fff;margin-top:10px}.btn{padding:14px 22px;border:none;border-radius:12px;background:#d6ff00;color:#000;font-weight:700;cursor:pointer;margin-top:10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.chat{height:500px;overflow:auto;background:#000;padding:20px;border-radius:16px}.bubble{padding:14px;border-radius:14px;margin-bottom:14px;line-height:1.6}.user{background:#1f2937}.ai{background:#042f2e}.metric{background:#000;padding:20px;border-radius:16px;text-align:center}.metric h2{color:#d6ff00;font-size:40px}.hidden{display:none}@media(max-width:900px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<div class="logo">999 Agent P3</div>
<div id="userInfo">Não logado</div>
</header>

<div class="wrap">

<div id="authBox" class="card">
<h2>Login / Cadastro</h2>
<input class="input" id="email" placeholder="Seu email" />
<input class="input" id="senha" type="password" placeholder="Sua senha" />
<button class="btn" onclick="registrar()">Cadastrar</button>
<button class="btn" onclick="login()">Entrar</button>
</div>

<div id="app" class="hidden">
<div class="grid">
<div class="card">
<h2>Chat IA</h2>
<select class="input" id="agente">
<option>CEO Agent</option>
<option>Social Media Agent</option>
<option>Vendas Agent</option>
<option>Design Agent</option>
<option>Automation Agent</option>
</select>
<textarea id="prompt" class="input" placeholder="Digite sua ordem para o 999 Agent"></textarea>
<button class="btn" onclick="enviarIA()">Enviar para IA</button>
<button class="btn" onclick="logout()">Logout</button>
</div>

<div class="card">
<h2>Dashboard</h2>
<div class="grid">
<div class="metric"><h2 id="mChats">0</h2><p>Chats</p></div>
<div class="metric"><h2 id="mPlano">FREE</h2><p>Plano</p></div>
</div>
</div>
</div>

<div class="card">
<h2>Histórico IA</h2>
<div id="chatBox" class="chat"></div>
</div>
</div>
</div>

<script>
const supabaseUrl='https://kzjuqssxifzqrzxskbwx.supabase.co';
const supabaseKey='sb_publishable_YQlrAj3NKf0wa2-3ocsFeg_6nbYUgv0';
const supabase=window.supabase.createClient(supabaseUrl,supabaseKey);

let currentUser=null;

async function registrar(){
const email=document.getElementById('email').value;
const senha=document.getElementById('senha').value;

const {data,error}=await supabase.auth.signUp({email,password:senha});

if(error){alert(error.message);return;}

alert('Conta criada');
}

async function login(){
const email=document.getElementById('email').value;
const senha=document.getElementById('senha').value;

const {data,error}=await supabase.auth.signInWithPassword({email,password:senha});

if(error){alert(error.message);return;}

currentUser=data.user;

await carregarPerfil();
await carregarChats();

}

async function carregarPerfil(){
document.getElementById('authBox').classList.add('hidden');
document.getElementById('app').classList.remove('hidden');
document.getElementById('userInfo').innerText=currentUser.email;

const {data}=await supabase
.from('perfis')
.select('*')
.eq('id',currentUser.id)
.single();

if(!data){
await supabase.from('perfis').insert([
{
id:currentUser.id,
nome:currentUser.email,
plano:'free'
}
]);
}
}

async function enviarIA(){
const agente=document.getElementById('agente').value;
const prompt=document.getElementById('prompt').value;

if(!prompt)return;

const chat=document.getElementById('chatBox');

chat.innerHTML+=`<div class="bubble user"><b>Você:</b><br>${prompt}</div>`;

const {data,error}=await supabase.functions.invoke('p1-ai',{
body:{
prompt:`Agente: ${agente}\n\nUsuário: ${prompt}`
}
});

if(error){
chat.innerHTML+=`<div class="bubble ai">Erro IA</div>`;
return;
}

const resposta=data.output;

chat.innerHTML+=`<div class="bubble ai"><b>${agente}:</b><br>${resposta}</div>`;

await supabase.from('chats').insert([
{
user_id:currentUser.id,
agente,
prompt,
resposta
}
]);

await carregarChats();
}

async function carregarChats(){
const {data}=await supabase
.from('chats')
.select('*')
.eq('user_id',currentUser.id)
.order('created_at',{ascending:false});

if(data){
document.getElementById('mChats').innerText=data.length;
}
}

async function logout(){
await supabase.auth.signOut();
location.reload();
}

supabase.auth.getSession().then(async ({data:{session}})=>{
if(session){
currentUser=session.user;
await carregarPerfil();
await carregarChats();
}
});
</script>
</body>
</html>
